<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceder - AeroLex AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg-deep: #07071a;
    --bg-card: #0e0e2a;
    --border: #1e1e4a;
    --text-primary: #e8e8f0;
    --text-secondary: #9090b8;
    --text-muted: #606088;
    --accent-cyan: #00e5ff;
    --accent-violet: #8b5cf6;
    --accent-purple: #6c3bd2;
    --gradient-primary: linear-gradient(135deg, #6c3bd2, #4f46e5);
    --gradient-accent: linear-gradient(135deg, #00e5ff, #8b5cf6);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  #stars-canvas {
    position: fixed; inset: 0; z-index: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  @keyframes fadeScale {
    from { opacity: 0; transform: scale(0.95) translateY(12px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(139,92,246,0.2), 0 0 40px rgba(139,92,246,0.1); }
    50% { box-shadow: 0 0 30px rgba(139,92,246,0.4), 0 0 60px rgba(139,92,246,0.2); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .glass-card {
    position: relative;
    z-index: 1;
    width: min(440px, 94%);
    padding: 40px 36px;
    background: rgba(14,14,42,0.6);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    animation: fadeScale 0.6s ease-out;
    box-shadow: 0 0 60px rgba(108,59,210,0.08);
  }

  .glass-card .logo {
    width: 56px; height: 56px;
    margin: 0 auto 14px;
    border-radius: 16px;
    background: var(--gradient-primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 24px rgba(108,59,210,0.35);
  }
  .glass-card h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px; font-weight: 700; text-align: center;
    background: var(--gradient-accent);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .glass-card .subtitle {
    text-align: center;
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .auth-step { display: none; animation: floatUp 0.4s ease-out; }
  .auth-step.active { display: block; }

  .step-indicator {
    display: flex; justify-content: center; gap: 8px;
    margin-bottom: 24px;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); transition: var(--transition);
  }
  .step-dot.active { background: var(--accent-violet); box-shadow: 0 0 8px rgba(139,92,246,0.5); }
  .step-dot.done { background: var(--accent-cyan); }

  .auth-tabs {
    display: flex; gap: 0; margin-bottom: 20px;
    border-radius: var(--radius-xs); overflow: hidden;
    border: 1px solid var(--border);
  }
  .auth-tab {
    flex: 1; padding: 10px;
    background: transparent; border: none;
    color: var(--text-muted); cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 500;
    transition: var(--transition);
  }
  .auth-tab.active { background: var(--accent-purple); color: #fff; }

  .auth-form { display: flex; flex-direction: column; gap: 12px; }
  .auth-input {
    width: 100%; padding: 13px 16px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px; outline: none;
    transition: var(--transition);
    box-sizing: border-box;
  }
  .auth-input:focus {
    border-color: var(--accent-violet);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
  }
  .auth-input::placeholder { color: var(--text-muted); }

  .auth-btn {
    width: 100%; padding: 13px;
    border: none; border-radius: var(--radius-xs);
    background: var(--gradient-primary);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: var(--transition);
    position: relative; overflow: hidden;
  }
  .auth-btn:hover { opacity: 0.92; transform: translateY(-1px); animation: glowPulse 2s infinite; }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; animation: none; }

  .auth-btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .auth-btn-secondary:hover {
    border-color: var(--accent-violet);
    color: var(--text-primary);
    animation: none;
  }

  .auth-msg { font-size: 13px; min-height: 20px; text-align: center; }
  .auth-msg.error { color: #f87171; }
  .auth-msg.success { color: #34d399; }
  .auth-msg.info { color: var(--text-secondary); }

  .email-display {
    background: rgba(139,92,246,0.1);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: var(--radius-xs);
    padding: 12px 16px;
    font-size: 14px;
    color: var(--accent-cyan);
    text-align: center;
    margin-bottom: 16px;
    word-break: break-all;
  }

  .loading-spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .success-check {
    text-align: center;
    font-size: 48px; margin-bottom: 16px;
  }
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>

<div class="glass-card" id="app">
  <div class="logo">🚀</div>
  <h1>AeroLex AI</h1>
  <p class="subtitle" id="stepTitle">Accede con tu correo</p>

  <div class="step-indicator">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <!-- STEP 1: Login / Register -->
  <div class="auth-step active" id="step1">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin">Iniciar sesión</button>
      <button class="auth-tab" id="tabRegister">Registrarse</button>
    </div>

    <form class="auth-form" id="loginForm">
      <input type="email" class="auth-input" id="loginEmail" placeholder="Correo electrónico" autocomplete="email" required>
      <input type="password" class="auth-input" id="loginPass" placeholder="Contraseña" autocomplete="current-password" required>
      <div class="auth-msg" id="loginMsg"></div>
      <button type="submit" class="auth-btn" id="loginBtn">Iniciar sesión</button>
    </form>

    <form class="auth-form" id="registerForm" style="display:none">
      <input type="email" class="auth-input" id="regEmail" placeholder="Correo electrónico" autocomplete="email" required>
      <input type="password" class="auth-input" id="regPass" placeholder="Contraseña (mín. 6 caracteres)" autocomplete="new-password" required>
      <input type="password" class="auth-input" id="regPassConfirm" placeholder="Confirmar contraseña" autocomplete="new-password" required>
      <div class="auth-msg" id="regMsg"></div>
      <button type="submit" class="auth-btn" id="regBtn">Crear cuenta</button>
    </form>
  </div>

  <!-- STEP 2: Email sent / Verify -->
  <div class="auth-step" id="step2">
    <div class="success-check">📧</div>
    <p style="text-align:center;color:var(--text-primary);font-size:15px;margin-bottom:8px;">Revisa tu correo</p>
    <p style="text-align:center;color:var(--text-secondary);font-size:13px;margin-bottom:20px;">
      Enviamos un enlace de verificación a:
    </p>
    <div class="email-display" id="verifyEmailDisplay"></div>
    <p style="text-align:center;color:var(--text-muted);font-size:12px;margin-bottom:20px;">
      Haz clic en el enlace del correo para verificar tu cuenta.<br>
      ¿Ya lo verificaste?
    </p>
    <button class="auth-btn auth-btn-secondary" id="checkVerifiedBtn">Ya verifiqué, iniciar sesión</button>
    <button class="auth-btn" id="backToLoginBtn" style="margin-top:8px;">Volver a inicio de sesión</button>
  </div>

  <!-- STEP 3: Username -->
  <div class="auth-step" id="step3">
    <p style="text-align:center;color:var(--text-secondary);font-size:13px;margin-bottom:20px;">
      Elige un nombre de usuario único para tu perfil
    </p>
    <form class="auth-form" id="usernameForm">
      <input type="text" class="auth-input" id="usernameInput" placeholder="Nombre de usuario" autocomplete="username" required>
      <div class="auth-msg" id="usernameMsg"></div>
      <button type="submit" class="auth-btn" id="usernameBtn">Finalizar</button>
    </form>
  </div>
</div>

<script>
// Stars background
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
for (let i = 0; i < 200; i++) {
  stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.5 + 0.3, a: Math.random() });
}
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.a += 0.003;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(s.a) * 0.3})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// DOM refs
const step1 = document.getElementById('step1');
const step2 = document.getElementById('step2');
const step3 = document.getElementById('step3');
const dot1 = document.getElementById('dot1');
const dot2 = document.getElementById('dot2');
const dot3 = document.getElementById('dot3');
const stepTitle = document.getElementById('stepTitle');

function goToStep(n) {
  [step1, step2, step3].forEach((el, i) => el.classList.toggle('active', i === n - 1));
  [dot1, dot2, dot3].forEach((el, i) => {
    el.classList.toggle('active', i === n - 1);
    el.classList.toggle('done', i < n - 1);
  });
  const titles = ['Accede con tu correo', 'Verifica tu correo', 'Elige tu username'];
  stepTitle.textContent = titles[n - 1];
}

let pendingEmail = '';
let pendingId = '';

// Tab switching
document.getElementById('tabLogin').addEventListener('click', () => {
  document.getElementById('tabLogin').classList.add('active');
  document.getElementById('tabRegister').classList.remove('active');
  document.getElementById('loginForm').style.display = 'flex';
  document.getElementById('registerForm').style.display = 'none';
  document.getElementById('loginMsg').textContent = '';
  document.getElementById('regMsg').textContent = '';
});
document.getElementById('tabRegister').addEventListener('click', () => {
  document.getElementById('tabRegister').classList.add('active');
  document.getElementById('tabLogin').classList.remove('active');
  document.getElementById('registerForm').style.display = 'flex';
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('loginMsg').textContent = '';
  document.getElementById('regMsg').textContent = '';
});

// Register
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPass').value;
  const confirm = document.getElementById('regPassConfirm').value;
  const msg = document.getElementById('regMsg');
  const btn = document.getElementById('regBtn');
  if (password !== confirm) { msg.className='auth-msg error'; msg.textContent='Las contraseñas no coinciden'; return; }
  btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span> Creando cuenta...';
  msg.className = 'auth-msg'; msg.textContent = '';
  try {
    const res = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al registrar');
    pendingEmail = email;
    document.getElementById('verifyEmailDisplay').textContent = email;
    goToStep(2);
  } catch (err) {
    msg.className='auth-msg error'; msg.textContent=err.message;
  } finally { btn.disabled=false; btn.textContent='Crear cuenta'; }
});

// Login
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const msg = document.getElementById('loginMsg');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span> Iniciando sesión...';
  msg.className = 'auth-msg'; msg.textContent = '';
  try {
    const res = await fetch('/api/auth/login', { method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
    const data = await res.json();
    if (!res.ok) {
      if (data.needsVerification) {
        pendingEmail = email;
        document.getElementById('verifyEmailDisplay').textContent = email;
        goToStep(2);
        return;
      }
      throw new Error(data.error || 'Error al iniciar sesión');
    }
    if (data.needsUsername) {
      pendingId = email;
      goToStep(3);
      return;
    }
    window.location.href = '/';
  } catch (err) {
    msg.className='auth-msg error'; msg.textContent=err.message;
  } finally { btn.disabled=false; btn.textContent='Iniciar sesión'; }
});

// Back to login from step 2
document.getElementById('backToLoginBtn').addEventListener('click', () => goToStep(1));

// Check verified and continue to login
document.getElementById('checkVerifiedBtn').addEventListener('click', async () => {
  if (!pendingEmail) { goToStep(1); return; }
  const btn = document.getElementById('checkVerifiedBtn');
  const msg = document.getElementById('step2').querySelector('.auth-msg') || (() => {
    const el = document.createElement('div');
    el.className = 'auth-msg';
    document.getElementById('step2').querySelector('p:last-of-type').after(el);
    return el;
  })();
  btn.disabled = true; btn.textContent = 'Verificando...';
  msg.className = 'auth-msg'; msg.textContent = '';
  try {
    const res = await fetch(`/api/auth/check-status?email=${encodeURIComponent(pendingEmail)}`);
    const data = await res.json();
    if (!data.exists) { msg.className='auth-msg error'; msg.textContent='❌ No encontramos esta cuenta. ¿Usaste otro email?'; btn.disabled=false; btn.textContent='Ya verifiqué, iniciar sesión'; return; }
    if (data.isVerified) {
      msg.className='auth-msg success'; msg.textContent='✅ Correo verificado. Ahora inicia sesión.';
      setTimeout(() => goToStep(1), 1200);
    } else {
      msg.className='auth-msg error'; msg.textContent='❌ Aún no detectamos la verificación. Revisa tu bandeja de entrada o spam.';
    }
  } catch (err) {
    msg.className='auth-msg error'; msg.textContent='Error al verificar. Intenta de nuevo.';
  }
  btn.disabled=false; btn.textContent='Ya verifiqué, iniciar sesión';
});

// Username
document.getElementById('usernameForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('usernameInput').value.trim();
  const msg = document.getElementById('usernameMsg');
  const btn = document.getElementById('usernameBtn');
  if (username.length < 3) { msg.className='auth-msg error'; msg.textContent='Mínimo 3 caracteres'; return; }
  if (!/^[a-zA-Z0-9_]+$/.test(username)) { msg.className='auth-msg error'; msg.textContent='Solo letras, números y _'; return; }
  btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span> Guardando...';
  msg.className = 'auth-msg'; msg.textContent = '';
  try {
    const res = await fetch('/api/auth/set-username', { method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username}) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error');
    window.location.href = '/';
  } catch (err) {
    msg.className='auth-msg error'; msg.textContent=err.message;
  } finally { btn.disabled=false; btn.textContent='Finalizar'; }
});

// Real-time username availability
document.getElementById('usernameInput').addEventListener('input', async (e) => {
  const val = e.target.value.trim();
  const msg = document.getElementById('usernameMsg');
  if (val.length < 3) { msg.className='auth-msg'; msg.textContent=''; return; }
  try {
    const res = await fetch(`/api/auth/check-username?username=${encodeURIComponent(val)}`);
    const data = await res.json();
    msg.className = data.available ? 'auth-msg success' : 'auth-msg error';
    msg.textContent = data.available ? '✅ Disponible' : '❌ No disponible';
  } catch { /* ignore */ }
});
</script>
</body>
</html>
