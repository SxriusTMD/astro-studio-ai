<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceder - AeroLex AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg-deep: #09090b;
    --bg-card: #121214;
    --border: #222226;
    --accent-gold: #c5a880;
    --text-primary: #f4f4f5;
    --text-muted: #71717a;
    --text-secondary: #a1a1aa;
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    
    /* Fallbacks for existing styles */
    --accent-cyan: var(--accent-gold);
    --accent-violet: var(--accent-gold);
    --accent-purple: #a88c6a;
    --gradient-primary: linear-gradient(135deg, var(--accent-gold), #a88c6a);
    --gradient-accent: linear-gradient(135deg, var(--accent-gold), #ffffff);
  }
  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-deep);
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    background-attachment: fixed;
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  #stars-canvas {
    display: none !important;
  }

  @keyframes fadeScale {
    from { opacity: 0; transform: scale(0.95) translateY(12px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(197,168,128,0.1), 0 0 40px rgba(197,168,128,0.05); }
    50% { box-shadow: 0 0 30px rgba(197,168,128,0.2), 0 0 60px rgba(197,168,128,0.1); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .glass-card {
    position: relative;
    z-index: 1;
    width: min(440px, 94%);
    padding: 40px 36px;
    background: rgba(18, 18, 20, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    animation: fadeScale 0.6s ease-out;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    display: block !important;
  }

  .glass-card .logo-img {
    display: block;
    width: 60px;
    height: 60px;
    object-fit: contain;
    margin: 0 auto 16px;
    filter: drop-shadow(0 0 8px rgba(197, 168, 128, 0.8));
  }
  .glass-card h1 {
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 700; text-align: center;
    background: linear-gradient(135deg, #ffffff 30%, var(--accent-gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .glass-card .subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .auth-step { display: none; animation: floatUp 0.4s ease-out; }
  .auth-step.active { display: block; }

  .step-indicator {
    display: flex; justify-content: center; gap: 8px;
    margin-bottom: 24px;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); transition: var(--transition);
  }
  .step-dot.active { background: var(--accent-gold); box-shadow: 0 0 8px rgba(197,168,128,0.5); }
  .step-dot.done { background: var(--accent-gold); }

  .auth-tabs {
    display: flex; gap: 0; margin-bottom: 20px;
    border-radius: var(--radius-xs); overflow: hidden;
    border: 1px solid var(--border);
  }
  .auth-tab {
    flex: 1; padding: 10px;
    background: transparent; border: none;
    color: var(--text-muted); cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 500;
    transition: var(--transition);
  }
  .auth-tab.active { background: var(--accent-gold); color: var(--bg-deep); font-weight: 600; }

  .auth-form { display: flex; flex-direction: column; gap: 12px; }
  .auth-input {
    width: 100%; padding: 13px 16px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px; outline: none;
    transition: var(--transition);
    box-sizing: border-box;
  }
  .auth-input:focus {
    border-color: var(--accent-gold);
    box-shadow: 0 0 0 3px rgba(197,168,128,0.15);
  }
  .auth-input::placeholder { color: var(--text-muted); }

  .auth-btn {
    width: 100%; padding: 13px;
    border: 1px solid var(--accent-gold); border-radius: var(--radius-xs);
    background: transparent;
    color: var(--accent-gold);
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: var(--transition);
    position: relative; overflow: hidden;
  }
  .auth-btn:hover { background: var(--accent-gold); color: var(--bg-deep); transform: translateY(-1px); }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; background: transparent; color: var(--text-muted); border-color: var(--border); }

  .auth-btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .auth-btn-secondary:hover {
    border-color: var(--accent-gold);
    color: var(--text-primary);
  }

  .auth-msg { font-size: 13px; min-height: 20px; text-align: center; }
  .auth-msg.error { color: #f87171; }
  .auth-msg.success { color: #34d399; }
  .auth-msg.info { color: var(--text-secondary); }

  .email-display {
    background: rgba(197, 168, 128, 0.08) !important;
    border: 1px solid rgba(197, 168, 128, 0.2) !important;
    border-radius: var(--radius-xs);
    padding: 12px 16px;
    font-size: 14px;
    color: var(--accent-gold) !important;
    text-align: center;
    margin-bottom: 16px;
    word-break: break-all;
  }

  .loading-spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .success-check {
    text-align: center;
    font-size: 48px; margin-bottom: 16px;
  }
</style>
</head>
<body>


<div class="glass-card" id="app">
  <img src="/assets/AeroLexAI_Ship_Trans.png" class="logo-img" alt="AeroLex AI Logo">
  <h1>AeroLex AI</h1>
  <p class="subtitle" id="stepTitle">Accede con tu correo</p>

  <div class="step-indicator">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <!-- STEP 1: Login / Register -->
  <div class="auth-step active" id="step1">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin">Iniciar sesión</button>
      <button class="auth-tab" id="tabRegister">Registrarse</button>
    </div>

    <form class="auth-form" id="loginForm">
      <input type="email" class="auth-input" id="loginEmail" placeholder="Correo electrónico" autocomplete="email" required>
      <div style="position: relative; width: 100%;">
        <input type="password" class="auth-input" id="loginPass" placeholder="Contraseña" autocomplete="current-password" style="padding-right: 48px;" required>
        <button type="button" class="toggle-password-btn" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 4px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; outline: none;">
          <svg class="eye-open w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          <svg class="eye-closed w-5 h-5" style="display: none;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
        </button>
      </div>
      <div style="text-align: right; margin-top: -6px;">
        <button type="button" id="forgotPasswordBtn" style="background: none; border: none; color: var(--accent-cyan); font-size: 12px; cursor: pointer; text-decoration: underline; font-family: 'Inter', sans-serif;">¿Olvidaste tu contraseña?</button>
      </div>
      <div class="auth-msg" id="loginMsg"></div>
      <button type="submit" class="auth-btn" id="loginBtn">Iniciar sesión</button>
    </form>

    <form class="auth-form" id="registerForm" style="display:none">
      <input type="email" class="auth-input" id="regEmail" placeholder="Correo electrónico" autocomplete="email" required>
      <div style="position: relative; width: 100%;">
        <input type="password" class="auth-input" id="regPass" placeholder="Contraseña (mín. 6 caracteres)" autocomplete="new-password" style="padding-right: 48px;" required>
        <button type="button" class="toggle-password-btn" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 4px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; outline: none;">
          <svg class="eye-open w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          <svg class="eye-closed w-5 h-5" style="display: none;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
        </button>
      </div>
      <div style="position: relative; width: 100%;">
        <input type="password" class="auth-input" id="regPassConfirm" placeholder="Confirmar contraseña" autocomplete="new-password" style="padding-right: 48px;" required>
        <button type="button" class="toggle-password-btn" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 4px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; outline: none;">
          <svg class="eye-open w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          <svg class="eye-closed w-5 h-5" style="display: none;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
        </button>
      </div>
      <div class="auth-msg" id="regMsg"></div>
      <button type="submit" class="auth-btn" id="regBtn">Crear cuenta</button>
    </form>
  </div>

  <!-- STEP 2: Email sent / Verify -->
  <div class="auth-step" id="step2">
    <div class="success-check">📧</div>
    <p style="text-align:center;color:var(--text-primary);font-size:15px;margin-bottom:8px;">Revisa tu correo</p>
    <p style="text-align:center;color:var(--text-secondary);font-size:13px;margin-bottom:20px;">
      Enviamos un enlace de verificación a:
    </p>
    <div class="email-display" id="verifyEmailDisplay"></div>
    <p style="text-align:center;color:var(--text-muted);font-size:12px;margin-bottom:20px;">
      Haz clic en el enlace del correo para verificar tu cuenta.<br>
      ¿Ya lo verificaste?
    </p>
    <button class="auth-btn auth-btn-secondary" id="checkVerifiedBtn">Ya verifiqué, iniciar sesión</button>
    <button class="auth-btn" id="backToLoginBtn" style="margin-top:8px;">Volver a inicio de sesión</button>
  </div>

  <!-- STEP 3: Username -->
  <div class="auth-step" id="step3">
    <p style="text-align:center;color:var(--text-secondary);font-size:13px;margin-bottom:20px;">
      Elige un nombre de usuario único para tu perfil
    </p>
    <form class="auth-form" id="usernameForm">
      <input type="text" class="auth-input" id="usernameInput" placeholder="Nombre de usuario" autocomplete="username" required>
      <div class="auth-msg" id="usernameMsg"></div>
      <button type="submit" class="auth-btn" id="usernameBtn">Finalizar</button>
    </form>
  </div>
</div>

<script>


// DOM refs
const step1 = document.getElementById('step1');
const step2 = document.getElementById('step2');
const step3 = document.getElementById('step3');
const dot1 = document.getElementById('dot1');
const dot2 = document.getElementById('dot2');
const dot3 = document.getElementById('dot3');
const stepTitle = document.getElementById('stepTitle');

function goToStep(n) {
  [step1, step2, step3].forEach((el, i) => {
    if (el) el.classList.toggle('active', i === n - 1);
  });
  [dot1, dot2, dot3].forEach((el, i) => {
    if (el) {
      el.classList.toggle('active', i === n - 1);
      el.classList.toggle('done', i < n - 1);
    }
  });
  const titles = ['Accede con tu correo', 'Verifica tu correo', 'Elige tu username'];
  if (stepTitle) {
    stepTitle.textContent = titles[n - 1] || '';
  }
}

let pendingEmail = '';
let pendingId = '';

// Tab switching
const tabLogin = document.getElementById('tabLogin');
const tabRegister = document.getElementById('tabRegister');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');
const loginMsg = document.getElementById('loginMsg');
const regMsg = document.getElementById('regMsg');

if (tabLogin) {
  tabLogin.addEventListener('click', () => {
    tabLogin.classList.add('active');
    if (tabRegister) tabRegister.classList.remove('active');
    if (loginForm) loginForm.style.display = 'flex';
    if (registerForm) registerForm.style.display = 'none';
    if (loginMsg) loginMsg.textContent = '';
    if (regMsg) regMsg.textContent = '';
  });
}

if (tabRegister) {
  tabRegister.addEventListener('click', () => {
    tabRegister.classList.add('active');
    if (tabLogin) tabLogin.classList.remove('active');
    if (registerForm) registerForm.style.display = 'flex';
    if (loginForm) loginForm.style.display = 'none';
    if (loginMsg) loginMsg.textContent = '';
    if (regMsg) regMsg.textContent = '';
  });
}

// Register
const regEmail = document.getElementById('regEmail');
const regPass = document.getElementById('regPass');
const regPassConfirm = document.getElementById('regPassConfirm');
const regBtn = document.getElementById('regBtn');

if (registerForm) {
  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!regEmail || !regPass || !regPassConfirm || !regMsg || !regBtn) return;
    const email = regEmail.value.trim();
    const password = regPass.value;
    const confirm = regPassConfirm.value;
    if (password !== confirm) { regMsg.className='auth-msg error'; regMsg.textContent='Las contraseñas no coinciden'; return; }
    regBtn.disabled = true; regBtn.innerHTML = '<span class="loading-spinner"></span> Creando cuenta...';
    regMsg.className = 'auth-msg'; regMsg.textContent = '';
    try {
      const res = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al registrar');
      pendingEmail = email;
      const verifyEmailDisplay = document.getElementById('verifyEmailDisplay');
      if (verifyEmailDisplay) verifyEmailDisplay.textContent = email;
      goToStep(2);
    } catch (err) {
      regMsg.className='auth-msg error'; regMsg.textContent=err.message;
    } finally { regBtn.disabled=false; regBtn.textContent='Crear cuenta'; }
  });
}

// Login
const loginEmail = document.getElementById('loginEmail');
const loginPass = document.getElementById('loginPass');
const loginBtn = document.getElementById('loginBtn');

if (loginForm) {
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!loginEmail || !loginPass || !loginMsg || !loginBtn) return;
    const email = loginEmail.value.trim();
    const password = loginPass.value;
    loginBtn.disabled = true; loginBtn.innerHTML = '<span class="loading-spinner"></span> Iniciando sesión...';
    loginMsg.className = 'auth-msg'; loginMsg.textContent = '';
    try {
      const res = await fetch('/api/auth/login', { method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
      const data = await res.json();
      if (!res.ok) {
        if (data.needsVerification) {
          pendingEmail = email;
          const verifyEmailDisplay = document.getElementById('verifyEmailDisplay');
          if (verifyEmailDisplay) verifyEmailDisplay.textContent = email;
          goToStep(2);
          return;
        }
        throw new Error(data.error || 'Error al iniciar sesión');
      }
      if (data.needsUsername) {
        pendingId = email;
        goToStep(3);
        return;
      }
      window.location.href = '/';
    } catch (err) {
      loginMsg.className='auth-msg error'; loginMsg.textContent=err.message;
    } finally { loginBtn.disabled=false; loginBtn.textContent='Iniciar sesión'; }
  });
}

// Back to login from step 2
const backToLoginBtn = document.getElementById('backToLoginBtn');
if (backToLoginBtn) {
  backToLoginBtn.addEventListener('click', () => goToStep(1));
}

// Check verified and continue to login
const checkVerifiedBtn = document.getElementById('checkVerifiedBtn');
if (checkVerifiedBtn) {
  checkVerifiedBtn.addEventListener('click', async () => {
    if (!pendingEmail) { goToStep(1); return; }
    const step2El = document.getElementById('step2');
    if (!step2El) return;
    const msg = step2El.querySelector('.auth-msg') || (() => {
      const el = document.createElement('div');
      el.className = 'auth-msg';
      const lastP = step2El.querySelector('p:last-of-type');
      if (lastP) lastP.after(el);
      return el;
    })();
    checkVerifiedBtn.disabled = true; checkVerifiedBtn.textContent = 'Verificando...';
    msg.className = 'auth-msg'; msg.textContent = '';
    try {
      const res = await fetch(`/api/auth/check-status?email=${encodeURIComponent(pendingEmail)}`);
      const data = await res.json();
      if (!data.exists) { msg.className='auth-msg error'; msg.textContent='❌ No encontramos esta cuenta. ¿Usaste otro email?'; checkVerifiedBtn.disabled=false; checkVerifiedBtn.textContent='Ya verifiqué, iniciar sesión'; return; }
      if (data.isVerified) {
        msg.className='auth-msg success'; msg.textContent='✅ Correo verificado. Ahora inicia sesión.';
        setTimeout(() => goToStep(1), 1200);
      } else {
        msg.className='auth-msg error'; msg.textContent='❌ Aún no detectamos la verificación. Revisa tu bandeja de entrada o spam.';
      }
    } catch (err) {
      msg.className='auth-msg error'; msg.textContent='Error al verificar. Intenta de nuevo.';
    }
    checkVerifiedBtn.disabled=false; checkVerifiedBtn.textContent='Ya verifiqué, iniciar sesión';
  });
}

// Username
const usernameForm = document.getElementById('usernameForm');
const usernameInput = document.getElementById('usernameInput');
const usernameMsg = document.getElementById('usernameMsg');
const usernameBtn = document.getElementById('usernameBtn');

if (usernameForm) {
  usernameForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!usernameInput || !usernameMsg || !usernameBtn) return;
    const username = usernameInput.value.trim();
    if (username.length < 3) { usernameMsg.className='auth-msg error'; usernameMsg.textContent='Mínimo 3 caracteres'; return; }
    if (!/^[a-zA-Z0-9_]+$/.test(username)) { usernameMsg.className='auth-msg error'; usernameMsg.textContent='Solo letras, números y _'; return; }
    usernameBtn.disabled = true; usernameBtn.innerHTML = '<span class="loading-spinner"></span> Guardando...';
    usernameMsg.className = 'auth-msg'; usernameMsg.textContent = '';
    try {
      const res = await fetch('/api/auth/set-username', { method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username}) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error');
      window.location.href = '/';
    } catch (err) {
      usernameMsg.className='auth-msg error'; usernameMsg.textContent=err.message;
    } finally { usernameBtn.disabled=false; usernameBtn.textContent='Finalizar'; }
  });
}

// Real-time username availability
if (usernameInput) {
  usernameInput.addEventListener('input', async (e) => {
    if (!usernameMsg) return;
    const val = e.target.value.trim();
    if (val.length < 3) { usernameMsg.className='auth-msg'; usernameMsg.textContent=''; return; }
    try {
      const res = await fetch(`/api/auth/check-username?username=${encodeURIComponent(val)}`);
      const data = await res.json();
      usernameMsg.className = data.available ? 'auth-msg success' : 'auth-msg error';
      usernameMsg.textContent = data.available ? '✅ Disponible' : '❌ No disponible';
    } catch { /* ignore */ }
  });
}

// SUPABASE FRONTEND MOCK CLIENT
const supabase = {
  auth: {
    resetPasswordForEmail: async (email) => {
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) return { error: new Error(data.error || 'Error al enviar recuperación') };
        return { data, error: null };
      } catch (err) {
        return { error: err };
      }
    }
  }
};

const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');
if (forgotPasswordBtn) {
  forgotPasswordBtn.addEventListener('click', async (e) => {
    e.preventDefault();
    if (!loginEmail || !loginMsg) return;
    const correoIngresado = loginEmail.value.trim();
    if (!correoIngresado) {
      loginMsg.className = 'auth-msg error';
      loginMsg.textContent = 'Por favor ingresa tu correo electrónico.';
      return;
    }
    loginMsg.className = 'auth-msg info';
    loginMsg.textContent = 'Enviando solicitud...';
    const { error } = await supabase.auth.resetPasswordForEmail(correoIngresado);
    if (error) {
      loginMsg.className = 'auth-msg error';
      loginMsg.textContent = error.message;
    } else {
      loginMsg.className = 'auth-msg success';
      loginMsg.textContent = 'Te hemos enviado un enlace de recuperación.';
    }
  });
}

// Toggle password visibility
document.querySelectorAll('.toggle-password-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.preventDefault();
    const input = btn.previousElementSibling;
    if (input) {
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      const eyeOpen = btn.querySelector('.eye-open');
      const eyeClosed = btn.querySelector('.eye-closed');
      if (eyeOpen && eyeClosed) {
        eyeOpen.style.display = isPass ? 'none' : 'block';
        eyeClosed.style.display = isPass ? 'block' : 'none';
      }
    }
  });
});
</script>
