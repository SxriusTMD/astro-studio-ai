<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Completa tu perfil - AeroLex AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg-deep: #09090b; --bg-card: #121214; --border: #222226;
    --accent-gold: #c5a880;
    --text-primary: #f4f4f5; --text-secondary: #a1a1aa; --text-muted: #71717a;
    --radius-xs: 6px; --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    
    /* Fallback variables */
    --accent-violet: var(--accent-gold);
    --accent-cyan: var(--accent-gold);
    --accent-purple: #a88c6a;
    --gradient-primary: linear-gradient(135deg, var(--accent-gold), #a88c6a);
    --gradient-accent: linear-gradient(135deg, var(--accent-gold), #ffffff);
  }
  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-deep);
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    background-attachment: fixed;
    color: var(--text-primary);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
    position: relative;
  }
  #stars { display: none !important; }
  @keyframes fadeScale { from { opacity:0; transform:scale(0.95) translateY(12px); } to { opacity:1; transform:scale(1) translateY(0); } }
  .glass-card {
    position:relative; z-index:1; width:min(420px,94%); padding:40px 36px;
    background:rgba(18,18,20,0.8); backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,0.08); border-radius:24px;
    text-align:center; animation:fadeScale 0.6s ease-out;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
  }
  .logo { width:56px; height:56px; margin:0 auto 14px; border-radius:16px; background:rgba(197,168,128,0.08); border:1px solid rgba(197,168,128,0.35); display:flex; align-items:center; justify-content:center; font-size:28px; box-shadow:0 0 24px rgba(197,168,128,0.15); }
  h1 { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; background:linear-gradient(135deg, #ffffff 30%, var(--accent-gold) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:4px; }
  .subtitle { color:var(--text-muted); font-size:14px; margin-bottom:24px; }
  .auth-form { display:flex; flex-direction:column; gap:12px; }
  .auth-input { width:100%; padding:13px 16px; border-radius:var(--radius-xs); border:1px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text-primary); font-family:'Inter',sans-serif; font-size:14px; outline:none; transition:var(--transition); box-sizing:border-box; }
  .auth-input:focus { border-color:var(--accent-gold); box-shadow:0 0 0 3px rgba(197,168,128,0.15); }
  .auth-input::placeholder { color:var(--text-muted); }
  .auth-btn { width:100%; padding:13px; border:1px solid var(--accent-gold); border-radius:var(--radius-xs); background:transparent; color:var(--accent-gold); font-family:'Inter',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:var(--transition); }
  .auth-btn:hover { background: var(--accent-gold); color: var(--bg-deep); transform:translateY(-1px); }
  .auth-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; background: transparent; color: var(--text-muted); border-color: var(--border); }
  .auth-msg { font-size:13px; min-height:20px; text-align:center; }
  .auth-msg.error { color:#f87171; }
  .auth-msg.success { color:#34d399; }
</style>
</head>
<body>
<div class="glass-card">
  <div class="logo">🚀</div>
  <h1>Completa tu perfil</h1>
  <p class="subtitle">Elige un nombre de usuario único</p>
  <form class="auth-form" id="usernameForm">
    <input type="text" class="auth-input" id="usernameInput" placeholder="Nombre de usuario" autocomplete="username" required>
    <div class="auth-msg" id="usernameMsg"></div>
    <button type="submit" class="auth-btn" id="usernameBtn">Finalizar</button>
  </form>
</div>
<script>


// Form event listeners
const usernameForm = document.getElementById('usernameForm');
const usernameInput = document.getElementById('usernameInput');
const usernameMsg = document.getElementById('usernameMsg');
const usernameBtn = document.getElementById('usernameBtn');

if (usernameForm) {
  usernameForm.addEventListener('submit', async e => {
    e.preventDefault();
    if (!usernameInput || !usernameMsg || !usernameBtn) return;
    const u = usernameInput.value.trim();
    if (u.length < 3) {
      usernameMsg.className = 'auth-msg error';
      usernameMsg.textContent = 'Mínimo 3 caracteres';
      return;
    }
    if (!/^[a-zA-Z0-9_]+$/.test(u)) {
      usernameMsg.className = 'auth-msg error';
      usernameMsg.textContent = 'Solo letras, números y _';
      return;
    }
    usernameBtn.disabled = true;
    usernameBtn.textContent = 'Guardando...';
    usernameMsg.className = 'auth-msg';
    usernameMsg.textContent = '';
    try {
      const r = await fetch('/api/auth/set-username', { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u }) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Error');
      window.location.href = '/';
    } catch (e) {
      usernameMsg.className = 'auth-msg error';
      usernameMsg.textContent = e.message;
    } finally {
      usernameBtn.disabled = false;
      usernameBtn.textContent = 'Finalizar';
    }
  });
}

if (usernameInput) {
  usernameInput.addEventListener('input', async e => {
    if (!usernameMsg) return;
    const v = e.target.value.trim();
    if (v.length < 3) {
      usernameMsg.className = 'auth-msg';
      usernameMsg.textContent = '';
      return;
    }
    try {
      const r = await fetch(`/api/auth/check-username?username=${encodeURIComponent(v)}`);
      const d = await r.json();
      usernameMsg.className = d.available ? 'auth-msg success' : 'auth-msg error';
      usernameMsg.textContent = d.available ? '✅ Disponible' : '❌ No disponible';
    } catch {}
  });
}
</script>
</body>
</html>
